<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ArticleLens"/>
  <title>ArticleLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #13161e;
      --card: #1a1d28;
      --border: #252836;
      --gold: #d4a853;
      --gold-soft: rgba(212,168,83,0.12);
      --text: #ede8df;
      --muted: #636878;
      --green: #5d9e6e;
      --red: #b86060;
      --chat-user: #1e2535;
      --chat-ai: #161a24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,12,16,0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: baseline; gap: 8px; }
    .logo-mark { color: var(--gold); font-size: 18px; }
    .logo-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); cursor: pointer; font-size: 16px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .icon-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Settings ── */
    .settings-drawer {
      display: none; background: var(--surface);
      border-bottom: 1px solid var(--border); padding: 16px 20px;
    }
    .settings-drawer.visible { display: block; }
    .settings-drawer label { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); display: block; margin-bottom: 6px; }
    .settings-drawer input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 13px;
      padding: 11px 14px; outline: none; margin-bottom: 10px;
    }
    .settings-drawer input:focus { border-color: var(--gold); }
    .save-btn {
      width: 100%; background: var(--gold-soft); border: 1px solid var(--gold);
      border-radius: 10px; color: var(--gold); font-size: 13px; font-weight: 500;
      padding: 11px; cursor: pointer;
    }

    /* ── Main ── */
    main { padding: 20px; max-width: 720px; margin: 0 auto; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 5px; margin-bottom: 18px;
      background: var(--surface); border-radius: 12px; padding: 4px;
    }
    .tab {
      flex: 1; background: none; border: none; border-radius: 9px;
      color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; padding: 10px 4px; transition: all 0.15s;
    }
    .tab.active { background: var(--card); color: var(--gold); }

    /* ── Inputs ── */
    input[type="text"], textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; padding: 13px 16px; outline: none; transition: border-color 0.15s;
      -webkit-appearance: none; margin-bottom: 12px;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--gold); }
    textarea { resize: none; line-height: 1.6; }
    ::placeholder { color: var(--muted); }

    /* ── Analyze btn ── */
    .analyze-btn {
      width: 100%; background: linear-gradient(135deg, #d4a853, #a07830);
      border: none; border-radius: 12px; color: #0a0c10;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; letter-spacing: 0.03em;
      padding: 15px; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .analyze-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .analyze-btn:disabled { background: var(--border); color: var(--muted); transform: none; }

    /* ── Loading ── */
    .loading { display: none; text-align: center; padding: 36px 0 16px; }
    .loading.visible { display: block; }
    .spinner { font-size: 26px; color: var(--gold); display: inline-block; animation: spin 1.2s linear infinite; }
    .loading-text { font-size: 11px; color: var(--muted); margin-top: 10px; letter-spacing: 0.1em; }

    /* ── Error ── */
    .error-box {
      display: none; margin-top: 12px; padding: 13px 16px;
      background: rgba(184,96,96,0.08); border: 1px solid rgba(184,96,96,0.25);
      border-radius: 10px; color: var(--red); font-size: 14px; line-height: 1.5;
    }
    .error-box.visible { display: block; }

    /* ── Result ── */
    .result { display: none; margin-top: 24px; animation: fadeUp 0.35s ease; }
    .result.visible { display: block; }

    .result-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .result-title {
      font-family: 'Playfair Display', serif; font-size: 19px;
      font-weight: 600; line-height: 1.35; color: #f5efe4; flex: 1;
    }
    .copy-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); cursor: pointer; font-size: 14px; padding: 6px 10px;
      flex-shrink: 0; transition: all 0.15s; white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

    .section-label {
      font-size: 10px; letter-spacing: 0.14em; color: var(--gold);
      font-weight: 500; margin-bottom: 10px;
    }

    .summary-box {
      font-size: 15px; line-height: 1.8; color: #c8c0b0;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--gold); border-radius: 0 10px 10px 0;
      padding: 16px 18px; margin-bottom: 20px;
    }

    .takeaways { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .takeaway {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 14px; line-height: 1.65; color: #c0b8a8;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      animation: fadeUp 0.3s ease both;
    }
    .takeaway-emoji { flex-shrink: 0; font-size: 16px; }

    /* ── Chat ── */
    .chat-section {
      border-top: 1px solid var(--border);
      padding-top: 20px; margin-top: 4px;
    }
    .chat-section-label {
      font-size: 10px; letter-spacing: 0.14em; color: var(--gold);
      font-weight: 500; margin-bottom: 14px;
    }
    .chat-messages { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .chat-msg {
      padding: 12px 15px; border-radius: 12px; font-size: 14px;
      line-height: 1.65; max-width: 92%; animation: fadeUp 0.25s ease;
    }
    .chat-msg.user {
      background: var(--chat-user); border: 1px solid #2a3048;
      color: #d8d0c4; align-self: flex-end; border-radius: 12px 12px 3px 12px;
    }
    .chat-msg.ai {
      background: var(--chat-ai); border: 1px solid var(--border);
      color: #c0b8a8; align-self: flex-start; border-radius: 12px 12px 12px 3px;
    }
    .chat-msg.ai.thinking { color: var(--muted); font-style: italic; }

    .chat-input-row { display: flex; gap: 8px; }
    .chat-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; padding: 11px 14px; outline: none; margin-bottom: 0;
    }
    .chat-input:focus { border-color: var(--gold); }
    .chat-send-btn {
      background: var(--gold-soft); border: 1px solid var(--gold);
      border-radius: 10px; color: var(--gold); cursor: pointer;
      font-size: 16px; padding: 11px 16px; transition: all 0.15s; flex-shrink: 0;
    }
    .chat-send-btn:hover { background: rgba(212,168,83,0.2); }
    .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── History ── */
    .history-section { margin-top: 28px; }
    .history-label { font-size: 10px; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 10px; }
    .history-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--gold); }
    .history-item-title { font-size: 14px; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
    .history-item-meta { font-size: 11px; color: var(--muted); }

    /* ── Bookmarklet section ── */
    .bookmarklet-banner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .bookmarklet-icon { font-size: 24px; flex-shrink: 0; }
    .bookmarklet-text { flex: 1; }
    .bookmarklet-text strong { display: block; font-size: 14px; color: var(--text); margin-bottom: 3px; }
    .bookmarklet-text span { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .bookmarklet-link {
      display: inline-block; margin-top: 8px;
      background: var(--gold-soft); border: 1px solid var(--gold);
      border-radius: 8px; color: var(--gold); font-size: 12px;
      font-weight: 500; padding: 7px 14px; text-decoration: none; cursor: pointer;
    }

    .bottom-spacer { height: 48px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">◈</span>
    <span class="logo-name">ArticleLens</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="settings-toggle" title="Settings">⚙</button>
  </div>
</header>

<div class="settings-drawer" id="settings-drawer">
  <label>BACKEND URL</label>
  <input type="text" id="backend-url" placeholder="https://your-app.railway.app"/>
  <button class="save-btn" id="save-settings">SAVE SETTINGS</button>
</div>

<main>

  <!-- Bookmarklet banner -->
  <div class="bookmarklet-banner">
    <div class="bookmarklet-icon">🔖</div>
    <div class="bookmarklet-text">
      <strong>One-click summarize any page</strong>
      <span>Drag the button below to your bookmarks bar, then click it on any article.</span>
      <br/>
      <a class="bookmarklet-link" id="bookmarklet-link">⬆ Drag to Bookmarks Bar</a>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="url">🔗 URL</button>
    <button class="tab" data-tab="rss">📡 RSS</button>
    <button class="tab" data-tab="text">📋 Paste</button>
  </div>

  <!-- Inputs -->
  <div id="input-url">
    <input type="text" id="url-input" placeholder="https://example.com/article..."/>
  </div>
  <div id="input-rss" style="display:none">
    <input type="text" id="rss-input" placeholder="https://feeds.bbci.co.uk/news/rss.xml"/>
  </div>
  <div id="input-text" style="display:none">
    <textarea id="text-input" rows="7" placeholder="Paste the full article text here..."></textarea>
  </div>

  <button class="analyze-btn" id="analyze-btn">◈ SUMMARIZE</button>

  <div class="loading" id="loading">
    <div class="spinner">◈</div>
    <div class="loading-text">ANALYZING ARTICLE…</div>
  </div>

  <div class="error-box" id="error-box"></div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-header">
      <div class="result-title" id="result-title"></div>
      <button class="copy-btn" id="copy-btn">📋 Copy</button>
    </div>

    <div class="section-label">SUMMARY</div>
    <div class="summary-box" id="result-summary"></div>

    <div class="section-label">KEY TAKEAWAYS</div>
    <div class="takeaways" id="result-takeaways"></div>

    <!-- Chat -->
    <div class="chat-section">
      <div class="chat-section-label">💬 ASK QUESTIONS ABOUT THIS ARTICLE</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text" placeholder="e.g. What are the implications of this?"/>
        <button class="chat-send-btn" id="chat-send">➤</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="history-section" style="display:none">
    <div class="history-label">RECENT ARTICLES</div>
    <div id="history-list"></div>
  </div>

  <div class="bottom-spacer"></div>
</main>

<script>
  const BACKEND_KEY = 'articlelens_backend_url';
  let currentTab = 'url';
  let currentArticleText = '';
  let currentArticleTitle = '';
  let chatHistory = [];
  let appHistory = JSON.parse(localStorage.getItem('articlelens_history') || '[]');

  // ── Bookmarklet ──────────────────────────────────────────────────────────
  function buildBookmarklet() {
    const backendUrl = localStorage.getItem(BACKEND_KEY) || 'YOUR_BACKEND_URL';
    const code = `javascript:(function(){
      var t=document.body.innerText.slice(0,6000);
      var ti=document.title;
      var w=window.open('','ArticleLens','width=480,height=600');
      w.document.write('<html><body style="background:#0a0c10;color:#ede8df;font-family:sans-serif;padding:20px"><h3 style="color:#d4a853">◈ ArticleLens</h3><p style="color:#636878;font-size:13px">Summarizing...</p></body></html>');
      fetch('${backendUrl}/summarize-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,title:ti})})
      .then(r=>r.json()).then(d=>{
        var html='<html><body style="background:#0a0c10;color:#ede8df;font-family:sans-serif;padding:20px;line-height:1.6">';
        html+='<div style="color:#d4a853;font-size:18px;margin-bottom:8px">◈ ArticleLens</div>';
        html+='<div style="font-size:16px;font-weight:bold;margin-bottom:16px;color:#f5efe4">'+d.title+'</div>';
        html+='<div style="font-size:10px;letter-spacing:0.1em;color:#d4a853;margin-bottom:8px">SUMMARY</div>';
        html+='<div style="background:#13161e;border-left:3px solid #d4a853;padding:14px;border-radius:0 8px 8px 0;font-size:14px;color:#c8c0b0;margin-bottom:16px">'+d.summary+'</div>';
        html+='<div style="font-size:10px;letter-spacing:0.1em;color:#d4a853;margin-bottom:8px">KEY TAKEAWAYS</div>';
        var ta=Array.isArray(d.takeaways)?d.takeaways:Object.values(d.takeaways||{});
        ta.forEach(function(t){html+='<div style="background:#13161e;border:1px solid #252836;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;color:#c0b8a8">'+t+'</div>';});
        html+='</body></html>';
        w.document.write(html);
      }).catch(function(e){w.document.write('<html><body style="background:#0a0c10;color:#b86060;padding:20px">Error: '+e.message+'</body></html>');});
    })();`;
    return code.replace(/\n\s*/g, '');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem(BACKEND_KEY);
    if (saved) document.getElementById('backend-url').value = saved;
    updateBookmarklet();
    renderHistory();

    document.getElementById('settings-toggle').addEventListener('click', () => {
      document.getElementById('settings-drawer').classList.toggle('visible');
    });

    document.getElementById('save-settings').addEventListener('click', () => {
      const url = document.getElementById('backend-url').value.trim().replace(/\/$/, '');
      localStorage.setItem(BACKEND_KEY, url);
      document.getElementById('settings-drawer').classList.remove('visible');
      updateBookmarklet();
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        document.getElementById('input-url').style.display = currentTab === 'url' ? 'block' : 'none';
        document.getElementById('input-rss').style.display = currentTab === 'rss' ? 'block' : 'none';
        document.getElementById('input-text').style.display = currentTab === 'text' ? 'block' : 'none';
        hideResult(); hideError();
      });
    });

    document.getElementById('analyze-btn').addEventListener('click', analyze);

    // Enter key on inputs
    document.getElementById('url-input').addEventListener('keydown', e => { if(e.key==='Enter') analyze(); });
    document.getElementById('rss-input').addEventListener('keydown', e => { if(e.key==='Enter') analyze(); });

    // Chat
    document.getElementById('chat-send').addEventListener('click', sendChat);
    document.getElementById('chat-input').addEventListener('keydown', e => { if(e.key==='Enter') sendChat(); });

    // Copy button
    document.getElementById('copy-btn').addEventListener('click', copyResult);
  });

  function updateBookmarklet() {
    document.getElementById('bookmarklet-link').href = buildBookmarklet();
  }

  // ── Analyze ───────────────────────────────────────────────────────────────
  async function analyze() {
    const backendUrl = localStorage.getItem(BACKEND_KEY);
    if (!backendUrl) { showError('Please set your backend URL in ⚙ Settings first.'); return; }

    hideError(); hideResult();
    setLoading(true);
    chatHistory = [];
    document.getElementById('chat-messages').innerHTML = '';

    try {
      let endpoint, body;

      if (currentTab === 'url') {
        const url = document.getElementById('url-input').value.trim();
        if (!url) throw new Error('Please enter a URL.');
        endpoint = '/summarize-url';
        body = { url };
      } else if (currentTab === 'rss') {
        const feedUrl = document.getElementById('rss-input').value.trim();
        if (!feedUrl) throw new Error('Please enter an RSS feed URL.');
        endpoint = '/fetch-rss';
        body = { feedUrl };
      } else {
        const text = document.getElementById('text-input').value.trim();
        if (!text) throw new Error('Please paste some article text.');
        currentArticleText = text;
        endpoint = '/summarize-text';
        body = { text };
      }

      const res = await fetch(`${backendUrl}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');

      if (currentTab === 'rss') {
        showRSSResult(data.articles);
      } else {
        currentArticleText = data.fullText || currentArticleText || '';
        currentArticleTitle = data.title || '';
        showResult(data);
        saveToHistory(data);
      }
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  async function sendChat() {
    const input = document.getElementById('chat-input');
    const question = input.value.trim();
    if (!question || !currentArticleText) return;

    const backendUrl = localStorage.getItem(BACKEND_KEY);
    input.value = '';

    addChatMsg(question, 'user');
    const thinkingEl = addChatMsg('Thinking…', 'ai thinking');
    document.getElementById('chat-send').disabled = true;

    chatHistory.push({ role: 'user', content: question });

    try {
      const res = await fetch(`${backendUrl}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          articleText: currentArticleText.slice(0, 6000),
          articleTitle: currentArticleTitle,
          history: chatHistory.slice(-6),
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Chat failed.');
      thinkingEl.className = 'chat-msg ai';
      thinkingEl.textContent = data.answer;
      chatHistory.push({ role: 'assistant', content: data.answer });
    } catch(err) {
      thinkingEl.className = 'chat-msg ai';
      thinkingEl.textContent = '⚠ ' + err.message;
    } finally {
      document.getElementById('chat-send').disabled = false;
      input.focus();
    }
  }

  function addChatMsg(text, type) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    div.textContent = text;
    container.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return div;
  }

  // ── Show results ──────────────────────────────────────────────────────────
  function showResult(data) {
    document.getElementById('result-title').textContent = data.title || 'Article Summary';
    document.getElementById('result-summary').textContent = data.summary || '';

    const container = document.getElementById('result-takeaways');
    container.innerHTML = '';
    let takeaways = data.takeaways || [];
    if (!Array.isArray(takeaways)) takeaways = Object.values(takeaways);

    takeaways.forEach((t, i) => {
      const str = String(t);
      const parts = str.split(' ');
      const emoji = parts[0];
      const text = parts.slice(1).join(' ');
      const div = document.createElement('div');
      div.className = 'takeaway';
      div.style.animationDelay = `${i * 0.07}s`;
      div.innerHTML = `<span class="takeaway-emoji">${emoji}</span><span>${text}</span>`;
      container.appendChild(div);
    });

    document.getElementById('result').classList.add('visible');
    setTimeout(() => document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  function showRSSResult(articles) {
    if (!articles || articles.length === 0) { showError('No articles found in this RSS feed.'); return; }
    const backendUrl = localStorage.getItem(BACKEND_KEY);

    document.getElementById('result-title').textContent = `📡 ${articles.length} articles found — tap one to summarize`;
    document.getElementById('result-summary').textContent = 'Select any article below to get a full AI summary and Q&A.';

    const container = document.getElementById('result-takeaways');
    container.innerHTML = '';
    articles.slice(0, 15).forEach(article => {
      const div = document.createElement('div');
      div.className = 'takeaway';
      div.style.cursor = 'pointer';
      div.innerHTML = `<span class="takeaway-emoji">📰</span><span>${article.title}</span>`;
      div.addEventListener('click', async () => {
        setLoading(true); hideError();
        try {
          const res = await fetch(`${backendUrl}/summarize-rss-item`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: article.link, title: article.title }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          currentArticleTitle = data.title;
          currentArticleText = article.title + '. ' + (article.description || '');
          chatHistory = [];
          document.getElementById('chat-messages').innerHTML = '';
          showResult(data);
          saveToHistory(data);
        } catch(err) { showError(err.message); }
        finally { setLoading(false); }
      });
      container.appendChild(div);
    });

    document.getElementById('result').classList.add('visible');
  }

  // ── Copy ──────────────────────────────────────────────────────────────────
  function copyResult() {
    const title = document.getElementById('result-title').textContent;
    const summary = document.getElementById('result-summary').textContent;
    const takeaways = [...document.querySelectorAll('.takeaway')].map(el => el.textContent).join('\n');
    const text = `${title}\n\nSUMMARY\n${summary}\n\nKEY TAKEAWAYS\n${takeaways}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy', 2000);
    });
  }

  // ── History ───────────────────────────────────────────────────────────────
  function saveToHistory(data) {
    appHistory = [{ title: data.title, summary: data.summary, takeaways: data.takeaways, time: Date.now() }, ...appHistory].slice(0, 15);
    localStorage.setItem('articlelens_history', JSON.stringify(appHistory));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    if (appHistory.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = '';
    appHistory.forEach(item => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<div class="history-item-title">${item.title}</div><div class="history-item-meta">${timeAgo(item.time)}</div>`;
      div.addEventListener('click', () => {
        currentArticleTitle = item.title;
        currentArticleText = item.summary;
        chatHistory = [];
        document.getElementById('chat-messages').innerHTML = '';
        showResult(item);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      list.appendChild(div);
    });
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return Math.floor(diff/86400000) + 'd ago';
  }

  function setLoading(on) {
    document.getElementById('loading').classList.toggle('visible', on);
    document.getElementById('analyze-btn').disabled = on;
    document.getElementById('analyze-btn').textContent = on ? 'ANALYZING…' : '◈ SUMMARIZE';
  }
  function showError(msg) { const el = document.getElementById('error-box'); el.textContent = msg; el.classList.add('visible'); }
  function hideError() { document.getElementById('error-box').classList.remove('visible'); }
  function hideResult() { document.getElementById('result').classList.remove('visible'); }
</script>
</body>
</html>
